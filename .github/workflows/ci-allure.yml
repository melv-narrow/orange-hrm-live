name: CI and Allure

on:
  push:
    branches-ignore:
      - gh-pages
  workflow_dispatch:
    inputs:
      suite:
        description: Choose which suite to run
        required: true
        default: full
        type: choice
        options:
          - smoke
          - full
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: write

concurrency:
  group: ci-allure-${{ github.ref }}-${{ github.event_name }}-${{ inputs.suite || 'default' }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  PLAYWRIGHT_BROWSERS_PATH: ~/.cache/ms-playwright
  ALLURE_REPORT_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  test-suite:
    name: test-suite
    runs-on: ubuntu-latest
    timeout-minutes: 35
    outputs:
      suite_mode: ${{ steps.suite.outputs.mode }}
      suite_command: ${{ steps.suite.outputs.command }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Select suite mode
        id: suite
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "mode=smoke" >> "$GITHUB_OUTPUT"
            echo "command=npm run test:smoke" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.suite }}" == "smoke" ]]; then
            echo "mode=smoke" >> "$GITHUB_OUTPUT"
            echo "command=npm run test:smoke" >> "$GITHUB_OUTPUT"
          else
            echo "mode=full" >> "$GITHUB_OUTPUT"
            echo "command=npm test" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Run linting
        run: npm run lint

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run Playwright suite
        run: ${{ steps.suite.outputs.command }}
        env:
          CI: 'true'

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_number }}
          path: playwright-report
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ github.run_number }}
          path: allure-results
          if-no-files-found: ignore
          retention-days: 30

  publish-report:
    name: publish-report
    needs: test-suite
    if: ${{ always() && needs.test-suite.result != 'cancelled' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Download Allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-results-${{ github.run_number }}
          path: allure-results
        continue-on-error: true

      - name: Ensure Allure results directory exists
        shell: bash
        run: mkdir -p allure-results

      - name: Load previous Allure history
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Build Allure report with history
        uses: simple-elf/allure-report-action@v1.13
        with:
          allure_results: allure-results
          allure_report: allure-report
          allure_history: allure-history
          gh_pages: gh-pages
          keep_reports: 30
          report_name: OrangeHRM Live Demo Report
          report_url: ${{ env.ALLURE_REPORT_URL }}

      - name: Upload Allure HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-${{ github.run_number }}
          path: allure-report
          if-no-files-found: ignore
          retention-days: 30

      - name: Publish Allure report to GitHub Pages branch
        if: >
          always() &&
          github.ref_name == github.event.repository.default_branch &&
          needs.test-suite.outputs.suite_mode == 'full'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          rm -rf pages-site
          mkdir -p pages-site
          rsync -a --delete --exclude '.git' allure-history/ pages-site/
          touch pages-site/.nojekyll
          cd pages-site
          git init -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git commit -m "Publish Allure report for run ${{ github.run_number }}"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          git push --force origin gh-pages

      - name: Add workflow summary
        if: always()
        shell: bash
        run: |
          node <<'EOF'
          const fs = require('node:fs');
          const summaryPath = process.env.GITHUB_STEP_SUMMARY;
          const suiteMode = `${{ needs.test-suite.outputs.suite_mode }}`;
          const suiteCommand = `${{ needs.test-suite.outputs.suite_command }}`;
          let statistics = null;

          if (fs.existsSync('allure-report/widgets/summary.json')) {
            statistics = JSON.parse(fs.readFileSync('allure-report/widgets/summary.json', 'utf8')).statistic;
          }

          const lines = [
            '## Test Reporting',
            '',
            `- Suite mode: \`${suiteMode}\``,
            `- Executed command: \`${suiteCommand}\``,
            `- Playwright HTML report artifact: \`playwright-report-${{ github.run_number }}\``,
            `- Allure results artifact: \`allure-results-${{ github.run_number }}\``,
            `- Allure HTML artifact: \`allure-report-${{ github.run_number }}\``,
          ];

          if (statistics) {
            lines.push(
              `- Summary: ${statistics.passed} passed, ${statistics.failed} failed, ${statistics.broken} broken, ${statistics.skipped} skipped, ${statistics.total} total`,
            );
          }

          if (`${{ github.ref_name }}` === `${{ github.event.repository.default_branch }}` && suiteMode === 'full') {
            lines.push(`- Hosted Allure report: [${process.env.ALLURE_REPORT_URL}](${process.env.ALLURE_REPORT_URL})`);
          } else {
            lines.push(`- Hosted Allure report updates only from full runs on \`${{ github.event.repository.default_branch }}\`.`);
          }

          fs.appendFileSync(summaryPath, `${lines.join('\n')}\n`);
          EOF
